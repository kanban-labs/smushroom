<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Low stimulus interactions for toddlers" />
    <meta property="og:title" content="Smushroom" />
    <meta property="og:description" content="Low stimulus interactions for toddlers" />
    <meta property="og:image" content="preview.jpg" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Smushroom" />
    <meta name="twitter:description" content="Low stimulus interactions for toddlers" />
    <meta name="twitter:image" content="preview.jpg" />
    <link rel="apple-touch-icon" href="preview.jpg" />
    <title>Smushroom</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍄</text></svg>"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        background: #0a0a12;
        overflow: hidden;
        cursor: none;
      }
      canvas {
        position: absolute;
        top: 0;
        left: 0;
        display: block;
        width: 100%;
        height: 100%;
      }
      #hint {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;

        color: rgba(255, 255, 255, 0.45);
        font-family: monospace;
        font-size: 18px;
        letter-spacing: 0.15em;
        pointer-events: none;
        transition: opacity 2s;
      }
      #hint.hidden {
        opacity: 0;
      }
      #fs-btn,
      #mute-btn {
        position: fixed;
        bottom: 16px;
        width: 36px;
        height: 36px;
        padding: 6px;
        background: none;
        border: none;
        color: rgba(255, 255, 255, 0.75);
        cursor: pointer;
        transition: opacity 0.3s;
        z-index: 10;
      }
      #fs-btn {
        right: 16px;
      }
      #mute-btn {
        right: 56px;
      }
      /* mute shifts right to make room for settings */
      #fs-btn:hover,
      #mute-btn:hover {
        color: rgba(255, 255, 255, 1);
      }
      #fs-btn.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #settings-btn {
        position: fixed;
        bottom: 16px;
        right: 96px;
        width: 36px;
        height: 36px;
        padding: 6px;
        background: none;
        border: none;
        color: rgba(255, 255, 255, 0.75);
        cursor: pointer;
        transition: color 0.3s;
        z-index: 10;
      }
      #settings-btn:hover {
        color: rgba(255, 255, 255, 1);
      }
      #settings-panel {
        position: fixed;
        bottom: 64px;
        right: 16px;
        width: 260px;
        background: rgba(15, 15, 28, 0.92);
        border: 0.5px solid rgba(255, 255, 255, 0.15);
        border-radius: 12px;
        padding: 16px 18px;
        z-index: 20;
        display: none;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      #settings-panel.open {
        display: block;
      }
      #settings-panel h3 {
        margin: 0 0 14px;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.45);
        font-family: monospace;
      }
      .sp-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }
      .sp-row:last-child {
        margin-bottom: 0;
      }
      .sp-label {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.6);
        font-family: monospace;
        width: 72px;
        flex-shrink: 0;
      }
      .sp-row input[type='range'] {
        flex: 1;
        accent-color: rgba(255, 255, 255, 0.7);
        cursor: pointer;
      }
      .sp-val {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.85);
        font-family: monospace;
        width: 36px;
        text-align: right;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <canvas id="blobs"></canvas>
    <div id="hint">
      press any key<br />
      or tap anywhere
    </div>
    <button id="mute-btn" aria-label="Toggle sound">
      <svg
        id="mute-icon"
        viewBox="0 0 24 24"
        width="24"
        height="24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
        <path class="sound-on" d="M15.54 8.46a5 5 0 0 1 0 7.07" />
        <path class="sound-on" d="M19.07 4.93a10 10 0 0 1 0 14.14" />
        <line class="sound-off" x1="18" y1="9" x2="22" y2="15" style="display: none" />
        <line class="sound-off" x1="22" y1="9" x2="18" y2="15" style="display: none" />
      </svg>
    </button>
    <button id="fs-btn" aria-label="Toggle fullscreen">
      <img src="maximize.svg" alt="" width="24" height="24" style="filter: brightness(0) invert(1); opacity: inherit" />
    </button>

    <script>
      const canvas = document.getElementById('c')
      const ctx = canvas.getContext('2d')
      const blobCanvas = document.getElementById('blobs')
      const bCtx = blobCanvas.getContext('2d')
      const hint = document.getElementById('hint')

      // CSS blur on the blob canvas — works on iOS Safari unlike ctx.filter
      // const BLUR_PX = Math.round(Math.min(window.innerWidth, window.innerHeight) * 0.012)
      const BLUR_PX = 30
      blobCanvas.style.filter = `blur(${BLUR_PX}px)`

      let W, H
      function resize() {
        W = canvas.width = blobCanvas.width = window.innerWidth
        H = canvas.height = blobCanvas.height = window.innerHeight
      }
      resize()
      window.addEventListener('resize', resize)

      // Palette sets — each keypress picks a random harmony
      const palettes = [
        ['#ff9de2', '#ffb347', '#ffe066'], // warm peach-pink-gold
        ['#a0e4ff', '#b8f0c8', '#e0d4ff'], // cool mint-sky-lavender
        ['#ff6eb0', '#ff9a3c', '#ffde59'], // vivid sunset
        ['#7de8e8', '#a8b4ff', '#f9a8d4'], // pastel sea
        ['#fff07c', '#90f5b0', '#87d4ff'], // lemon-lime-sky
        ['#ff8fab', '#ffb347', '#c5f2c7'], // rose-amber-sage
        ['#d4a5ff', '#a5d4ff', '#ffd4a5'], // soft triadic
        ['#ffe5ec', '#ffc8a2', '#d4f1f4'], // milky pastels
      ]

      const blobs = []

      class Blob {
        constructor() {
          const palette = palettes[Math.floor(Math.random() * palettes.length)]
          const c1 = palette[Math.floor(Math.random() * palette.length)]
          const c2 = palette[Math.floor(Math.random() * palette.length)]

          // spawn slightly off-centre for variety
          this.x = W * (0.2 + Math.random() * 0.6)
          this.y = H * (0.2 + Math.random() * 0.6)

          this.r = Math.min(W, H) * (0.08 + Math.random() * 0.15)
          this.c1 = c1
          this.c2 = c2

          // gentle drift
          this.vx = (Math.random() - 0.5) * 0.35
          this.vy = (Math.random() - 0.5) * 0.35

          // blob shape: 6-8 control point radii offsets
          this.pts = 7
          this.offsets = Array.from({ length: this.pts }, () => 0.7 + Math.random() * 0.6)
          this.offsetSpeeds = Array.from({ length: this.pts }, () => (Math.random() - 0.5) * 0.008)
          this.phase = Math.random() * Math.PI * 2
          this.phaseSpeed = 0.004 + Math.random() * 0.006

          // lifecycle
          this.alpha = 0
          this.fadeIn = true
          this.maxAlpha = 0.55 + Math.random() * 0.3
          this.fadeSpeed = 0.004 + Math.random() * 0.004
          this.dead = false

          // pre-allocated geometry arrays for draw()
          this._angles = new Float64Array(this.pts)
          this._radii = new Float64Array(this.pts)
          this._px = new Float64Array(this.pts)
          this._py = new Float64Array(this.pts)
        }

        update() {
          // wiggle shape
          this.phase += this.phaseSpeed
          for (let i = 0; i < this.pts; i++) {
            this.offsets[i] += this.offsetSpeeds[i]
            if (this.offsets[i] > 1.3 || this.offsets[i] < 0.5) this.offsetSpeeds[i] *= -1
          }

          // drift
          this.x += this.vx
          this.y += this.vy

          // soft bounce
          if (this.x < -this.r) this.x = W + this.r
          if (this.x > W + this.r) this.x = -this.r
          if (this.y < -this.r) this.y = H + this.r
          if (this.y > H + this.r) this.y = -this.r

          // fade
          if (this.fadeIn) {
            this.alpha += this.fadeSpeed
            if (this.alpha >= this.maxAlpha) {
              this.alpha = this.maxAlpha
              this.fadeIn = false
            }
          } else {
            this.alpha -= this.fadeSpeed * 0.5
            if (this.alpha <= 0) this.dead = true
          }
        }

        startFadeOut() {
          this.fadeIn = false
          this.fadeSpeed = 0.003 + Math.random() * 0.003
        }

        draw() {
          const pts = this.pts
          const step = (Math.PI * 2) / pts
          const { _angles: angles, _radii: radii, _px: px, _py: py } = this
          for (let i = 0; i < pts; i++) {
            angles[i] = step * i + this.phase
            radii[i] = this.r * this.offsets[i]
            px[i] = this.x + Math.cos(angles[i]) * radii[i]
            py[i] = this.y + Math.sin(angles[i]) * radii[i]
          }

          bCtx.save()
          bCtx.globalAlpha = Math.max(0, this.alpha)
          bCtx.beginPath()
          bCtx.moveTo((px[pts - 1] + px[0]) / 2, (py[pts - 1] + py[0]) / 2)
          for (let i = 0; i < pts; i++) {
            const next = (i + 1) % pts
            const mx = (px[i] + px[next]) / 2
            const my = (py[i] + py[next]) / 2
            bCtx.quadraticCurveTo(px[i], py[i], mx, my)
          }
          bCtx.closePath()

          const grad = bCtx.createRadialGradient(this.x - this.r * 0.2, this.y - this.r * 0.2, this.r * 0.05, this.x, this.y, this.r * 1.2)
          grad.addColorStop(0, this.c1 + 'ff')
          grad.addColorStop(1, this.c2 + '00')
          bCtx.fillStyle = grad
          bCtx.fill()
          bCtx.restore()
        }
      }

      // ── Audio system ──
      let audioCtx = null
      let muted = false

      // Live-adjustable sound parameters (written by the settings panel)
      const soundParams = {
        octaveShift: 0, // semitone multiplier offset: -2=low, -1=mid-low, 0=default, 1=higher
        filterHz: 800, // low-pass cutoff — warm default
        decayMult: 2.0, // multiplies each preset's decay
        volume: 0.6, // peak gain
      }

      // Base C major pentatonic at C5-E6
      const chimePresets = [
        { freq: 523.25, decay: 0.7 }, // C5
        { freq: 587.33, decay: 0.65 }, // D5
        { freq: 659.25, decay: 0.6 }, // E5
        { freq: 783.99, decay: 0.55 }, // G5
        { freq: 880.0, decay: 0.5 }, // A5
        { freq: 1046.5, decay: 0.65 }, // C6
        { freq: 1174.66, decay: 0.6 }, // D6
        { freq: 1318.51, decay: 0.55 }, // E6
      ]

      function ensureAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)()
        if (audioCtx.state === 'suspended') audioCtx.resume()
      }

      function playChime(noteIndex, octaveOverride) {
        if (muted) return
        ensureAudio()
        const t = audioCtx.currentTime
        const preset = noteIndex !== undefined
          ? chimePresets[Math.min(Math.max(noteIndex, 0), chimePresets.length - 1)]
          : chimePresets[Math.floor(Math.random() * chimePresets.length)]

        // Apply octave shift: each step is one octave (factor of 2)
        const octave = octaveOverride !== undefined ? octaveOverride : soundParams.octaveShift
        const octaveFactor = Math.pow(2, octave)
        const baseFreq = preset.freq * octaveFactor
        const freq = baseFreq + (Math.random() - 0.5) * 12 * octaveFactor
        const decay = preset.decay * soundParams.decayMult

        const filter = audioCtx.createBiquadFilter()
        filter.type = 'lowpass'
        filter.frequency.value = soundParams.filterHz
        filter.Q.value = 0.5

        const osc = audioCtx.createOscillator()
        osc.type = 'triangle'
        osc.frequency.setValueAtTime(freq * 1.008, t)
        osc.frequency.linearRampToValueAtTime(freq, t + 0.02)

        const osc2 = audioCtx.createOscillator()
        osc2.type = 'sine'
        osc2.frequency.value = freq * 2.005
        const harmGain = audioCtx.createGain()
        harmGain.gain.setValueAtTime(0.06, t)
        harmGain.gain.exponentialRampToValueAtTime(0.001, t + decay * 0.4)

        const gain = audioCtx.createGain()
        gain.gain.setValueAtTime(0.001, t)
        gain.gain.linearRampToValueAtTime(soundParams.volume, t + 0.004)
        gain.gain.exponentialRampToValueAtTime(soundParams.volume * 0.3, t + 0.06)
        gain.gain.exponentialRampToValueAtTime(0.001, t + decay)

        osc.connect(filter)
        osc2.connect(harmGain)
        harmGain.connect(filter)
        filter.connect(gain)
        gain.connect(audioCtx.destination)

        osc.start(t)
        osc2.start(t)
        osc.stop(t + decay)
        osc2.stop(t + decay)
      }

      // ── Mute toggle ──
      const muteBtn = document.getElementById('mute-btn')
      const muteIcon = document.getElementById('mute-icon')
      const soundOn = muteIcon.querySelectorAll('.sound-on')
      const soundOff = muteIcon.querySelectorAll('.sound-off')
      muteBtn.addEventListener('click', (e) => {
        e.stopPropagation()
        muted = !muted
        soundOn.forEach((el) => (el.style.display = muted ? 'none' : ''))
        soundOff.forEach((el) => (el.style.display = muted ? '' : 'none'))
      })

      let hintVisible = true
      let lastSpawn = 0
      const DEBOUNCE_MS = 120 // minimum ms between new blobs

      function spawnBlob(x, y) {
        const now = performance.now()
        if (now - lastSpawn < DEBOUNCE_MS) return
        lastSpawn = now

        if (hintVisible) {
          hint.classList.add('hidden')
          hintVisible = false
        }

        // fade out oldest blob if getting crowded
        let liveCount = 0
        let oldest = null
        for (let i = 0; i < blobs.length; i++) {
          if (!blobs[i].dead && !blobs[i].fadeIn) {
            liveCount++
            if (!oldest) oldest = blobs[i]
          }
        }
        if (liveCount > 6) oldest.startFadeOut()

        const b = new Blob()
        if (x !== undefined) {
          b.x = x
          b.y = y
        }
        blobs.push(b)
        playChime()
      }

      // fullscreen toggle — hide on platforms without support (iOS Safari)
      const fsBtn = document.getElementById('fs-btn')
      if (!document.fullscreenEnabled) {
        fsBtn.style.display = 'none'
      } else {
        fsBtn.addEventListener('click', (e) => {
          e.stopPropagation()
          if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen()
          } else {
            document.exitFullscreen()
          }
        })
        document.addEventListener('fullscreenchange', () => {
          fsBtn.classList.toggle('hidden', !!document.fullscreenElement)
        })
      }

      document.addEventListener('keydown', (e) => {
        e.preventDefault()
        spawnBlob()
      })

      // ── Drag gesture for pitch control ──
      const DRAG_THRESHOLD = 10
      const dragState = { active: false, isDrag: false, startX: 0, startY: 0, currentX: 0, currentY: 0, blob: null, pointerId: null, lastTrailX: 0, lastTrailY: 0 }

      function isUIControl(target) {
        return fsBtn.contains(target) || muteBtn.contains(target) ||
          document.getElementById('settings-btn')?.contains(target) ||
          document.getElementById('settings-panel')?.contains(target)
      }

      function mapYDeltaToNoteIndex(dy) {
        // Negative dy = dragged up = higher note
        const range = Math.min(H * 0.5, 300)
        const clamped = Math.max(-range, Math.min(range, dy))
        // Map from [-range, range] to [chimePresets.length-1, 0] (up = high index)
        const normalized = (-clamped + range) / (2 * range) // 0..1, 1 = up
        return Math.round(normalized * (chimePresets.length - 1))
      }

      function mapXDistanceToOctave(dx) {
        const range = Math.min(W * 0.4, 300)
        const clamped = Math.max(-range, Math.min(range, dx))
        return clamped / range // -1..+1
      }

      const TRAIL_SPACING = 30 // min px between trail blobs

      function spawnTrailBlob(x, y) {
        const b = new Blob()
        b.x = x
        b.y = y
        b.r = Math.min(W, H) * (0.03 + Math.random() * 0.02)
        b.fadeIn = true
        b.alpha = 0
        b.maxAlpha = 0.4 + Math.random() * 0.15
        b.fadeSpeed = 0.008 + Math.random() * 0.004 // fade quicker than normal blobs
        b.vx = (Math.random() - 0.5) * 0.15 // slower drift
        b.vy = (Math.random() - 0.5) * 0.15
        blobs.push(b)
        return b
      }

      function finishGesture(x, y) {
        if (!dragState.isDrag) {
          // Tap — unchanged behavior
          spawnBlob(x, y)
          // Remove the drag blob if one was created
          if (dragState.blob) {
            dragState.blob.dead = true
          }
        } else {
          // Drag — compute note + octave from deltas
          const dy = dragState.currentY - dragState.startY
          const dx = dragState.currentX - dragState.startX
          const noteIndex = mapYDeltaToNoteIndex(dy)
          const octave = mapXDistanceToOctave(dx)

          const now = performance.now()
          if (now - lastSpawn < DEBOUNCE_MS) {
            dragState.blob = null
            dragState.active = false
            return
          }
          lastSpawn = now

          if (hintVisible) {
            hint.classList.add('hidden')
            hintVisible = false
          }

          // Crowd-thinning (same logic as spawnBlob)
          let liveCount = 0
          let oldest = null
          for (let i = 0; i < blobs.length; i++) {
            if (!blobs[i].dead && !blobs[i].fadeIn) {
              liveCount++
              if (!oldest) oldest = blobs[i]
            }
          }
          if (liveCount > 6 && oldest) oldest.startFadeOut()

          playChime(noteIndex, octave)
        }
        dragState.blob = null
        dragState.active = false
      }

      function startGesture(x, y, id, target) {
        if (isUIControl(target)) return
        dragState.active = true
        dragState.isDrag = false
        dragState.startX = x
        dragState.startY = y
        dragState.currentX = x
        dragState.currentY = y
        dragState.pointerId = id
        dragState.lastTrailX = x
        dragState.lastTrailY = y
        dragState.blob = spawnTrailBlob(x, y)
      }

      function moveGesture(x, y) {
        if (!dragState.active) return
        dragState.currentX = x
        dragState.currentY = y
        const dx = x - dragState.startX
        const dy = y - dragState.startY
        if (!dragState.isDrag && Math.sqrt(dx * dx + dy * dy) >= DRAG_THRESHOLD) {
          dragState.isDrag = true
        }
        if (dragState.isDrag) {
          const tdx = x - dragState.lastTrailX
          const tdy = y - dragState.lastTrailY
          if (tdx * tdx + tdy * tdy >= TRAIL_SPACING * TRAIL_SPACING) {
            spawnTrailBlob(x, y)
            dragState.lastTrailX = x
            dragState.lastTrailY = y
          }
        }
      }

      function endGesture() {
        if (!dragState.active) return
        finishGesture(dragState.startX, dragState.startY)
      }

      // Mouse events
      document.addEventListener('mousedown', (e) => {
        startGesture(e.clientX, e.clientY, 'mouse', e.target)
      })
      document.addEventListener('mousemove', (e) => {
        if (dragState.pointerId !== 'mouse' || !dragState.active) return
        moveGesture(e.clientX, e.clientY)
      })
      document.addEventListener('mouseup', (e) => {
        if (dragState.pointerId !== 'mouse') return
        endGesture()
      })

      // Touch events
      document.addEventListener('touchstart', (e) => {
        if (isUIControl(e.target)) return
        e.preventDefault()
        const t = e.changedTouches[0]
        startGesture(t.clientX, t.clientY, t.identifier, e.target)
      }, { passive: false })
      document.addEventListener('touchmove', (e) => {
        if (!dragState.active) return
        const t = Array.from(e.changedTouches).find(t => t.identifier === dragState.pointerId)
        if (!t) return
        e.preventDefault()
        moveGesture(t.clientX, t.clientY)
      }, { passive: false })
      document.addEventListener('touchend', (e) => {
        const t = Array.from(e.changedTouches).find(t => t.identifier === dragState.pointerId)
        if (!t) return
        e.preventDefault()
        endGesture()
      }, { passive: false })
      document.addEventListener('touchcancel', (e) => {
        if (dragState.active) {
          if (dragState.blob) dragState.blob.dead = true
          dragState.blob = null
          dragState.active = false
        }
      })

      function loop() {
        ctx.fillStyle = '#0a0a12'
        ctx.fillRect(0, 0, W, H)
        bCtx.clearRect(0, 0, W, H)

        for (let i = blobs.length - 1; i >= 0; i--) {
          blobs[i].update()
          blobs[i].draw()
          if (blobs[i].dead) {
            blobs[i] = blobs[blobs.length - 1]
            blobs.pop()
          }
        }

        requestAnimationFrame(loop)
      }
      loop()
    </script>
  </body>
</html>
