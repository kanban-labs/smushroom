<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Low stimulus interactions for toddlers" />
    <meta property="og:title" content="Smushroom" />
    <meta property="og:description" content="Low stimulus interactions for toddlers" />
    <meta property="og:image" content="preview.jpg" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Smushroom" />
    <meta name="twitter:description" content="Low stimulus interactions for toddlers" />
    <meta name="twitter:image" content="preview.jpg" />
    <link rel="apple-touch-icon" href="preview.jpg" />
    <title>Smushroom</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍄</text></svg>"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        background: #0a0a12;
        overflow: hidden;
        cursor: none;
      }
      canvas {
        position: absolute;
        top: 0;
        left: 0;
        display: block;
        width: 100%;
        height: 100%;
      }
      #hint {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 15vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;

        color: rgba(255, 255, 255, 0.45);
        font-family: monospace;
        font-size: 18px;
        letter-spacing: 0.15em;
        pointer-events: none;
        transition: opacity 2s;
      }
      #hint.hidden {
        opacity: 0;
      }
      #fs-btn,
      #mute-btn {
        position: fixed;
        bottom: 16px;
        width: 36px;
        height: 36px;
        padding: 6px;
        background: none;
        border: none;
        color: rgba(255, 255, 255, 0.75);
        cursor: pointer;
        transition: opacity 0.3s;
        z-index: 10;
      }
      #fs-btn {
        right: 16px;
      }
      #mute-btn {
        right: 56px;
      }
      #fs-btn:hover,
      #mute-btn:hover {
        color: rgba(255, 255, 255, 1);
      }
      #fs-btn.hidden {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <canvas id="blobs"></canvas>
    <div id="hint">
      press any key<br />
      or tap anywhere
    </div>
    <button id="mute-btn" aria-label="Toggle sound">
      <svg
        id="mute-icon"
        viewBox="0 0 24 24"
        width="24"
        height="24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
        <path class="sound-on" d="M15.54 8.46a5 5 0 0 1 0 7.07" />
        <path class="sound-on" d="M19.07 4.93a10 10 0 0 1 0 14.14" />
      </svg>
    </button>
    <button id="fs-btn" aria-label="Toggle fullscreen">
      <img src="maximize.svg" alt="" width="24" height="24" style="filter: brightness(0) invert(1); opacity: inherit" />
    </button>

    <script>
      const canvas = document.getElementById('c')
      const ctx = canvas.getContext('2d')
      const blobCanvas = document.getElementById('blobs')
      const bCtx = blobCanvas.getContext('2d')
      const hint = document.getElementById('hint')

      // CSS blur on the blob canvas — works on iOS Safari unlike ctx.filter
      // const BLUR_PX = Math.round(Math.min(window.innerWidth, window.innerHeight) * 0.012)
      const BLUR_PX = 30
      blobCanvas.style.filter = `blur(${BLUR_PX}px)`

      let W, H
      function resize() {
        W = canvas.width = blobCanvas.width = window.innerWidth
        H = canvas.height = blobCanvas.height = window.innerHeight
      }
      resize()
      window.addEventListener('resize', resize)

      // Palette sets — each keypress picks a random harmony
      const palettes = [
        ['#ff9de2', '#ffb347', '#ffe066'], // warm peach-pink-gold
        ['#a0e4ff', '#b8f0c8', '#e0d4ff'], // cool mint-sky-lavender
        ['#ff6eb0', '#ff9a3c', '#ffde59'], // vivid sunset
        ['#7de8e8', '#a8b4ff', '#f9a8d4'], // pastel sea
        ['#fff07c', '#90f5b0', '#87d4ff'], // lemon-lime-sky
        ['#ff8fab', '#ffb347', '#c5f2c7'], // rose-amber-sage
        ['#d4a5ff', '#a5d4ff', '#ffd4a5'], // soft triadic
        ['#ffe5ec', '#ffc8a2', '#d4f1f4'], // milky pastels
      ]

      const blobs = []

      class Blob {
        constructor() {
          const palette = palettes[Math.floor(Math.random() * palettes.length)]
          const c1 = palette[Math.floor(Math.random() * palette.length)]
          const c2 = palette[Math.floor(Math.random() * palette.length)]

          // spawn slightly off-centre for variety
          this.x = W * (0.2 + Math.random() * 0.6)
          this.y = H * (0.2 + Math.random() * 0.6)

          this.r = Math.min(W, H) * (0.08 + Math.random() * 0.15)
          this.c1 = c1
          this.c2 = c2

          // gentle drift
          this.vx = (Math.random() - 0.5) * 0.35
          this.vy = (Math.random() - 0.5) * 0.35

          // blob shape: 6-8 control point radii offsets
          this.pts = 7
          this.offsets = Array.from({ length: this.pts }, () => 0.7 + Math.random() * 0.6)
          this.offsetSpeeds = Array.from({ length: this.pts }, () => (Math.random() - 0.5) * 0.008)
          this.phase = Math.random() * Math.PI * 2
          this.phaseSpeed = 0.004 + Math.random() * 0.006

          // lifecycle
          this.alpha = 0
          this.fadeIn = true
          this.maxAlpha = 0.55 + Math.random() * 0.3
          this.fadeSpeed = 0.004 + Math.random() * 0.004
          this.dead = false
        }

        update() {
          // wiggle shape
          this.phase += this.phaseSpeed
          this.offsets = this.offsets.map((o, i) => {
            let n = o + this.offsetSpeeds[i]
            if (n > 1.3 || n < 0.5) this.offsetSpeeds[i] *= -1
            return n
          })

          // drift
          this.x += this.vx
          this.y += this.vy

          // soft bounce
          if (this.x < -this.r) this.x = W + this.r
          if (this.x > W + this.r) this.x = -this.r
          if (this.y < -this.r) this.y = H + this.r
          if (this.y > H + this.r) this.y = -this.r

          // fade
          if (this.fadeIn) {
            this.alpha += this.fadeSpeed
            if (this.alpha >= this.maxAlpha) {
              this.alpha = this.maxAlpha
              this.fadeIn = false
            }
          } else {
            this.alpha -= this.fadeSpeed * 0.5
            if (this.alpha <= 0) this.dead = true
          }
        }

        startFadeOut() {
          this.fadeIn = false
          this.fadeSpeed = 0.003 + Math.random() * 0.003
        }

        draw() {
          const pts = this.pts
          const step = (Math.PI * 2) / pts
          const angles = []
          const radii = []
          for (let i = 0; i < pts; i++) {
            angles.push(step * i + this.phase)
            radii.push(this.r * this.offsets[i])
          }
          const px = angles.map((a, i) => this.x + Math.cos(a) * radii[i])
          const py = angles.map((a, i) => this.y + Math.sin(a) * radii[i])

          bCtx.save()
          bCtx.globalAlpha = Math.max(0, this.alpha)
          bCtx.beginPath()
          bCtx.moveTo((px[pts - 1] + px[0]) / 2, (py[pts - 1] + py[0]) / 2)
          for (let i = 0; i < pts; i++) {
            const next = (i + 1) % pts
            const mx = (px[i] + px[next]) / 2
            const my = (py[i] + py[next]) / 2
            bCtx.quadraticCurveTo(px[i], py[i], mx, my)
          }
          bCtx.closePath()

          const grad = bCtx.createRadialGradient(this.x - this.r * 0.2, this.y - this.r * 0.2, this.r * 0.05, this.x, this.y, this.r * 1.2)
          grad.addColorStop(0, this.c1 + 'ff')
          grad.addColorStop(1, this.c2 + '00')
          bCtx.fillStyle = grad
          bCtx.fill()
          bCtx.restore()
        }
      }

      // ── Audio system ──
      let audioCtx = null
      let muted = false
      const chimePresets = [
        { type: 'sine', freq: 520, decay: 0.4 }, // soft bell
        { type: 'sine', freq: 280, decay: 0.2 }, // low plop
        { type: 'triangle', freq: 680, decay: 0.3 }, // bright ding
        { type: 'sine', freq: 440, decay: 0.5, detune: 12 }, // airy chime
      ]

      function ensureAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)()
        if (audioCtx.state === 'suspended') audioCtx.resume()
      }

      function playChime() {
        if (muted) return
        ensureAudio()
        const preset = chimePresets[Math.floor(Math.random() * chimePresets.length)]
        const osc = audioCtx.createOscillator()
        const gain = audioCtx.createGain()
        osc.type = preset.type
        osc.frequency.value = preset.freq + (Math.random() - 0.5) * 60
        if (preset.detune) osc.detune.value = preset.detune
        gain.gain.setValueAtTime(0.18, audioCtx.currentTime)
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + preset.decay)
        osc.connect(gain)
        gain.connect(audioCtx.destination)
        osc.start()
        osc.stop(audioCtx.currentTime + preset.decay)
      }

      // ── Mute toggle ──
      const muteBtn = document.getElementById('mute-btn')
      const muteIcon = document.getElementById('mute-icon')
      muteBtn.addEventListener('click', (e) => {
        e.stopPropagation()
        muted = !muted
        muteIcon.querySelectorAll('.sound-on').forEach((p) => (p.style.display = muted ? 'none' : ''))
        if (muted) {
          // add an X over the speaker when muted
          if (!muteIcon.querySelector('.sound-off')) {
            const l1 = document.createElementNS('http://www.w3.org/2000/svg', 'line')
            l1.setAttribute('class', 'sound-off')
            l1.setAttribute('x1', '18')
            l1.setAttribute('y1', '9')
            l1.setAttribute('x2', '22')
            l1.setAttribute('y2', '15')
            const l2 = document.createElementNS('http://www.w3.org/2000/svg', 'line')
            l2.setAttribute('class', 'sound-off')
            l2.setAttribute('x1', '22')
            l2.setAttribute('y1', '9')
            l2.setAttribute('x2', '18')
            l2.setAttribute('y2', '15')
            muteIcon.appendChild(l1)
            muteIcon.appendChild(l2)
          }
        } else {
          muteIcon.querySelectorAll('.sound-off').forEach((el) => el.remove())
        }
      })

      let hintVisible = true
      let lastSpawn = 0
      const DEBOUNCE_MS = 120 // minimum ms between new blobs

      function spawnBlob(x, y) {
        const now = performance.now()
        if (now - lastSpawn < DEBOUNCE_MS) return
        lastSpawn = now

        if (hintVisible) {
          hint.classList.add('hidden')
          hintVisible = false
        }

        // fade out oldest blob if getting crowded
        const live = blobs.filter((b) => !b.dead && !b.fadeIn)
        if (live.length > 6) {
          live[0].startFadeOut()
        }

        const b = new Blob()
        if (x !== undefined) {
          b.x = x
          b.y = y
        }
        blobs.push(b)
        playChime()
      }

      // fullscreen toggle — hide on platforms without support (iOS Safari)
      const fsBtn = document.getElementById('fs-btn')
      if (!document.fullscreenEnabled) {
        fsBtn.style.display = 'none'
      } else {
        fsBtn.addEventListener('click', (e) => {
          e.stopPropagation()
          if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen()
          } else {
            document.exitFullscreen()
          }
        })
        document.addEventListener('fullscreenchange', () => {
          fsBtn.classList.toggle('hidden', !!document.fullscreenElement)
        })
      }

      document.addEventListener('keydown', (e) => {
        e.preventDefault()
        spawnBlob()
      })

      // also support touch for tablets
      document.addEventListener(
        'touchstart',
        (e) => {
          // let taps on control buttons through
          if (fsBtn.contains(e.target) || muteBtn.contains(e.target)) return
          e.preventDefault()
          const t = e.changedTouches[0]
          spawnBlob(t.clientX, t.clientY)
        },
        { passive: false },
      )

      function loop() {
        ctx.clearRect(0, 0, W, H)
        ctx.fillStyle = '#0a0a12'
        ctx.fillRect(0, 0, W, H)
        bCtx.clearRect(0, 0, W, H)

        for (let i = blobs.length - 1; i >= 0; i--) {
          blobs[i].update()
          blobs[i].draw()
          if (blobs[i].dead) blobs.splice(i, 1)
        }

        requestAnimationFrame(loop)
      }
      loop()
    </script>
  </body>
</html>
