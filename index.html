<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Low stimulus interactions for toddlers" />
    <meta property="og:title" content="Smushroom" />
    <meta property="og:description" content="Low stimulus interactions for toddlers" />
    <meta property="og:image" content="preview.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Smushroom" />
    <meta name="twitter:description" content="Low stimulus interactions for toddlers" />
    <meta name="twitter:image" content="preview.png" />
    <link rel="apple-touch-icon" href="preview.png" />
    <title>Smushroom</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍄</text></svg>"
    />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <canvas id="c"></canvas>
    <canvas id="blobs"></canvas>
    <div id="hint">
      press any key<br />
      or tap anywhere
    </div>
    <button id="mute-btn" aria-label="Toggle sound">
      <svg
        id="mute-icon"
        viewBox="0 0 24 24"
        width="24"
        height="24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
        <path class="sound-on" d="M15.54 8.46a5 5 0 0 1 0 7.07" />
        <path class="sound-on" d="M19.07 4.93a10 10 0 0 1 0 14.14" />
        <line class="sound-off" x1="18" y1="9" x2="22" y2="15" style="display: none" />
        <line class="sound-off" x1="22" y1="9" x2="18" y2="15" style="display: none" />
      </svg>
    </button>
    <button id="fs-btn" aria-label="Toggle fullscreen">
      <img src="maximize.svg" alt="" width="24" height="24" style="filter: brightness(0) invert(1); opacity: inherit" />
    </button>

    <script type="module" src="assets/scripts/main.js"></script>
  </body>
</html>
