<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Low stimulus interactions for toddlers" />
    <meta property="og:title" content="Smushroom" />
    <meta property="og:description" content="Low stimulus interactions for toddlers" />
    <meta property="og:image" content="preview.jpg" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Smushroom" />
    <meta name="twitter:description" content="Low stimulus interactions for toddlers" />
    <meta name="twitter:image" content="preview.jpg" />
    <link rel="apple-touch-icon" href="preview.jpg" />
    <title>Smushroom</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍄</text></svg>"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        background: #0a0a12;
        overflow: hidden;
        cursor: none;
      }
      canvas {
        position: absolute;
        top: 0;
        left: 0;
        display: block;
        width: 100%;
        height: 100%;
      }
      #hint {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;

        color: rgba(255, 255, 255, 0.45);
        font-family: monospace;
        font-size: 18px;
        letter-spacing: 0.15em;
        pointer-events: none;
        transition: opacity 2s;
      }
      #hint.hidden {
        opacity: 0;
      }
      #fs-btn,
      #mute-btn {
        position: fixed;
        bottom: 16px;
        width: 36px;
        height: 36px;
        padding: 6px;
        background: none;
        border: none;
        color: rgba(255, 255, 255, 0.75);
        cursor: pointer;
        transition: opacity 0.3s;
        z-index: 10;
      }
      #fs-btn {
        right: 16px;
      }
      #mute-btn {
        right: 56px;
      }
      /* mute shifts right to make room for settings */
      #fs-btn:hover,
      #mute-btn:hover {
        color: rgba(255, 255, 255, 1);
      }
      #fs-btn.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #settings-btn {
        position: fixed;
        bottom: 16px;
        right: 96px;
        width: 36px;
        height: 36px;
        padding: 6px;
        background: none;
        border: none;
        color: rgba(255, 255, 255, 0.75);
        cursor: pointer;
        transition: color 0.3s;
        z-index: 10;
      }
      #settings-btn:hover { color: rgba(255,255,255,1); }
      #settings-panel {
        position: fixed;
        bottom: 64px;
        right: 16px;
        width: 260px;
        background: rgba(15, 15, 28, 0.92);
        border: 0.5px solid rgba(255,255,255,0.15);
        border-radius: 12px;
        padding: 16px 18px;
        z-index: 20;
        display: none;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      #settings-panel.open { display: block; }
      #settings-panel h3 {
        margin: 0 0 14px;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.45);
        font-family: monospace;
      }
      .sp-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }
      .sp-row:last-child { margin-bottom: 0; }
      .sp-label {
        font-size: 12px;
        color: rgba(255,255,255,0.6);
        font-family: monospace;
        width: 72px;
        flex-shrink: 0;
      }
      .sp-row input[type=range] {
        flex: 1;
        accent-color: rgba(255,255,255,0.7);
        cursor: pointer;
      }
      .sp-val {
        font-size: 12px;
        color: rgba(255,255,255,0.85);
        font-family: monospace;
        width: 36px;
        text-align: right;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <canvas id="blobs"></canvas>
    <div id="hint">
      press any key<br />
      or tap anywhere
    </div>
    <button id="mute-btn" aria-label="Toggle sound">
      <svg
        id="mute-icon"
        viewBox="0 0 24 24"
        width="24"
        height="24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
        <path class="sound-on" d="M15.54 8.46a5 5 0 0 1 0 7.07" />
        <path class="sound-on" d="M19.07 4.93a10 10 0 0 1 0 14.14" />
        <line class="sound-off" x1="18" y1="9" x2="22" y2="15" style="display:none" />
        <line class="sound-off" x1="22" y1="9" x2="18" y2="15" style="display:none" />
      </svg>
    </button>
    <button id="settings-btn" aria-label="Sound settings">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
    <div id="settings-panel">
      <h3>Sound</h3>
      <div class="sp-row">
        <span class="sp-label">register</span>
        <input type="range" id="sp-octave" min="-2" max="1" step="1" value="0">
        <span class="sp-val" id="sp-octave-val">mid</span>
      </div>
      <div class="sp-row">
        <span class="sp-label">brightness</span>
        <input type="range" id="sp-filter" min="800" max="8000" step="100" value="3200">
        <span class="sp-val" id="sp-filter-val">mid</span>
      </div>
      <div class="sp-row">
        <span class="sp-label">decay</span>
        <input type="range" id="sp-decay" min="0.2" max="2.0" step="0.1" value="1.0">
        <span class="sp-val" id="sp-decay-val">1.0s</span>
      </div>
      <div class="sp-row">
        <span class="sp-label">volume</span>
        <input type="range" id="sp-vol" min="0.02" max="0.30" step="0.01" value="0.13">
        <span class="sp-val" id="sp-vol-val">mid</span>
      </div>
    </div>
    <button id="fs-btn" aria-label="Toggle fullscreen">
      <img src="maximize.svg" alt="" width="24" height="24" style="filter: brightness(0) invert(1); opacity: inherit" />
    </button>

    <script>
      const canvas = document.getElementById('c')
      const ctx = canvas.getContext('2d')
      const blobCanvas = document.getElementById('blobs')
      const bCtx = blobCanvas.getContext('2d')
      const hint = document.getElementById('hint')

      // CSS blur on the blob canvas — works on iOS Safari unlike ctx.filter
      // const BLUR_PX = Math.round(Math.min(window.innerWidth, window.innerHeight) * 0.012)
      const BLUR_PX = 30
      blobCanvas.style.filter = `blur(${BLUR_PX}px)`

      let W, H
      function resize() {
        W = canvas.width = blobCanvas.width = window.innerWidth
        H = canvas.height = blobCanvas.height = window.innerHeight
      }
      resize()
      window.addEventListener('resize', resize)

      // Palette sets — each keypress picks a random harmony
      const palettes = [
        ['#ff9de2', '#ffb347', '#ffe066'], // warm peach-pink-gold
        ['#a0e4ff', '#b8f0c8', '#e0d4ff'], // cool mint-sky-lavender
        ['#ff6eb0', '#ff9a3c', '#ffde59'], // vivid sunset
        ['#7de8e8', '#a8b4ff', '#f9a8d4'], // pastel sea
        ['#fff07c', '#90f5b0', '#87d4ff'], // lemon-lime-sky
        ['#ff8fab', '#ffb347', '#c5f2c7'], // rose-amber-sage
        ['#d4a5ff', '#a5d4ff', '#ffd4a5'], // soft triadic
        ['#ffe5ec', '#ffc8a2', '#d4f1f4'], // milky pastels
      ]

      const blobs = []

      class Blob {
        constructor() {
          const palette = palettes[Math.floor(Math.random() * palettes.length)]
          const c1 = palette[Math.floor(Math.random() * palette.length)]
          const c2 = palette[Math.floor(Math.random() * palette.length)]

          // spawn slightly off-centre for variety
          this.x = W * (0.2 + Math.random() * 0.6)
          this.y = H * (0.2 + Math.random() * 0.6)

          this.r = Math.min(W, H) * (0.08 + Math.random() * 0.15)
          this.c1 = c1
          this.c2 = c2

          // gentle drift
          this.vx = (Math.random() - 0.5) * 0.35
          this.vy = (Math.random() - 0.5) * 0.35

          // blob shape: 6-8 control point radii offsets
          this.pts = 7
          this.offsets = Array.from({ length: this.pts }, () => 0.7 + Math.random() * 0.6)
          this.offsetSpeeds = Array.from({ length: this.pts }, () => (Math.random() - 0.5) * 0.008)
          this.phase = Math.random() * Math.PI * 2
          this.phaseSpeed = 0.004 + Math.random() * 0.006

          // lifecycle
          this.alpha = 0
          this.fadeIn = true
          this.maxAlpha = 0.55 + Math.random() * 0.3
          this.fadeSpeed = 0.004 + Math.random() * 0.004
          this.dead = false

          // pre-allocated geometry arrays for draw()
          this._angles = new Float64Array(this.pts)
          this._radii = new Float64Array(this.pts)
          this._px = new Float64Array(this.pts)
          this._py = new Float64Array(this.pts)
        }

        update() {
          // wiggle shape
          this.phase += this.phaseSpeed
          for (let i = 0; i < this.pts; i++) {
            this.offsets[i] += this.offsetSpeeds[i]
            if (this.offsets[i] > 1.3 || this.offsets[i] < 0.5) this.offsetSpeeds[i] *= -1
          }

          // drift
          this.x += this.vx
          this.y += this.vy

          // soft bounce
          if (this.x < -this.r) this.x = W + this.r
          if (this.x > W + this.r) this.x = -this.r
          if (this.y < -this.r) this.y = H + this.r
          if (this.y > H + this.r) this.y = -this.r

          // fade
          if (this.fadeIn) {
            this.alpha += this.fadeSpeed
            if (this.alpha >= this.maxAlpha) {
              this.alpha = this.maxAlpha
              this.fadeIn = false
            }
          } else {
            this.alpha -= this.fadeSpeed * 0.5
            if (this.alpha <= 0) this.dead = true
          }
        }

        startFadeOut() {
          this.fadeIn = false
          this.fadeSpeed = 0.003 + Math.random() * 0.003
        }

        draw() {
          const pts = this.pts
          const step = (Math.PI * 2) / pts
          const { _angles: angles, _radii: radii, _px: px, _py: py } = this
          for (let i = 0; i < pts; i++) {
            angles[i] = step * i + this.phase
            radii[i] = this.r * this.offsets[i]
            px[i] = this.x + Math.cos(angles[i]) * radii[i]
            py[i] = this.y + Math.sin(angles[i]) * radii[i]
          }

          bCtx.save()
          bCtx.globalAlpha = Math.max(0, this.alpha)
          bCtx.beginPath()
          bCtx.moveTo((px[pts - 1] + px[0]) / 2, (py[pts - 1] + py[0]) / 2)
          for (let i = 0; i < pts; i++) {
            const next = (i + 1) % pts
            const mx = (px[i] + px[next]) / 2
            const my = (py[i] + py[next]) / 2
            bCtx.quadraticCurveTo(px[i], py[i], mx, my)
          }
          bCtx.closePath()

          const grad = bCtx.createRadialGradient(this.x - this.r * 0.2, this.y - this.r * 0.2, this.r * 0.05, this.x, this.y, this.r * 1.2)
          grad.addColorStop(0, this.c1 + 'ff')
          grad.addColorStop(1, this.c2 + '00')
          bCtx.fillStyle = grad
          bCtx.fill()
          bCtx.restore()
        }
      }

      // ── Audio system ──
      let audioCtx = null
      let muted = false

      // Live-adjustable sound parameters (written by the settings panel)
      const soundParams = {
        octaveShift: 0,    // semitone multiplier offset: -2=low, -1=mid-low, 0=default, 1=higher
        filterHz: 3200,    // low-pass cutoff
        decayMult: 1.0,    // multiplies each preset's decay
        volume: 0.13,      // peak gain
      }

      // Base C major pentatonic at C5-E6
      const chimePresets = [
        { freq: 523.25,  decay: 0.7  }, // C5
        { freq: 587.33,  decay: 0.65 }, // D5
        { freq: 659.25,  decay: 0.6  }, // E5
        { freq: 783.99,  decay: 0.55 }, // G5
        { freq: 880.00,  decay: 0.5  }, // A5
        { freq: 1046.50, decay: 0.65 }, // C6
        { freq: 1174.66, decay: 0.6  }, // D6
        { freq: 1318.51, decay: 0.55 }, // E6
      ]

      function ensureAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)()
        if (audioCtx.state === 'suspended') audioCtx.resume()
      }

      function playChime() {
        if (muted) return
        ensureAudio()
        const t = audioCtx.currentTime
        const preset = chimePresets[Math.floor(Math.random() * chimePresets.length)]

        // Apply octave shift: each step is one octave (factor of 2)
        const octaveFactor = Math.pow(2, soundParams.octaveShift)
        const baseFreq = preset.freq * octaveFactor
        const freq = baseFreq + (Math.random() - 0.5) * 12 * octaveFactor
        const decay = preset.decay * soundParams.decayMult

        const filter = audioCtx.createBiquadFilter()
        filter.type = 'lowpass'
        filter.frequency.value = soundParams.filterHz
        filter.Q.value = 0.5

        const osc = audioCtx.createOscillator()
        osc.type = 'triangle'
        osc.frequency.setValueAtTime(freq * 1.008, t)
        osc.frequency.linearRampToValueAtTime(freq, t + 0.02)

        const osc2 = audioCtx.createOscillator()
        osc2.type = 'sine'
        osc2.frequency.value = freq * 2.005
        const harmGain = audioCtx.createGain()
        harmGain.gain.setValueAtTime(0.06, t)
        harmGain.gain.exponentialRampToValueAtTime(0.001, t + decay * 0.4)

        const gain = audioCtx.createGain()
        gain.gain.setValueAtTime(0.001, t)
        gain.gain.linearRampToValueAtTime(soundParams.volume, t + 0.004)
        gain.gain.exponentialRampToValueAtTime(soundParams.volume * 0.3, t + 0.06)
        gain.gain.exponentialRampToValueAtTime(0.001, t + decay)

        osc.connect(filter)
        osc2.connect(harmGain)
        harmGain.connect(filter)
        filter.connect(gain)
        gain.connect(audioCtx.destination)

        osc.start(t)
        osc2.start(t)
        osc.stop(t + decay)
        osc2.stop(t + decay)
      }

      // ── Settings panel ──
      const settingsBtn = document.getElementById('settings-btn')
      const settingsPanel = document.getElementById('settings-panel')

      settingsBtn.addEventListener('click', (e) => {
        e.stopPropagation()
        settingsPanel.classList.toggle('open')
      })

      const octaveLabels = ['very low', 'low', 'mid', 'high']
      const filterLabels  = ['warm', 'mid', 'bright', 'crisp']

      function pct(val, min, max) {
        return (val - min) / (max - min)
      }
      function labelFromPct(p, labels) {
        return labels[Math.min(labels.length - 1, Math.floor(p * labels.length))]
      }

      const spOctave = document.getElementById('sp-octave')
      const spOctaveVal = document.getElementById('sp-octave-val')
      spOctave.addEventListener('input', (e) => {
        soundParams.octaveShift = parseInt(e.target.value)
        const idx = parseInt(e.target.value) + 2  // -2..1 -> 0..3
        spOctaveVal.textContent = octaveLabels[idx]
      })
      spOctaveVal.textContent = octaveLabels[parseInt(spOctave.value) + 2]

      const spFilter = document.getElementById('sp-filter')
      const spFilterVal = document.getElementById('sp-filter-val')
      spFilter.addEventListener('input', (e) => {
        soundParams.filterHz = parseFloat(e.target.value)
        spFilterVal.textContent = labelFromPct(pct(parseFloat(e.target.value), 800, 8000), filterLabels)
      })
      spFilterVal.textContent = labelFromPct(pct(parseFloat(spFilter.value), 800, 8000), filterLabels)

      const spDecay = document.getElementById('sp-decay')
      const spDecayVal = document.getElementById('sp-decay-val')
      spDecay.addEventListener('input', (e) => {
        soundParams.decayMult = parseFloat(e.target.value)
        spDecayVal.textContent = parseFloat(e.target.value).toFixed(1) + 's'
      })
      spDecayVal.textContent = parseFloat(spDecay.value).toFixed(1) + 's'

      const spVol = document.getElementById('sp-vol')
      const spVolVal = document.getElementById('sp-vol-val')
      const volLabels = ['soft', 'mid', 'loud']
      spVol.addEventListener('input', (e) => {
        soundParams.volume = parseFloat(e.target.value)
        spVolVal.textContent = labelFromPct(pct(parseFloat(e.target.value), 0.02, 0.30), volLabels)
      })
      spVolVal.textContent = labelFromPct(pct(parseFloat(spVol.value), 0.02, 0.30), volLabels)

      // ── Mute toggle ──
      const muteBtn = document.getElementById('mute-btn')
      const muteIcon = document.getElementById('mute-icon')
      const soundOn = muteIcon.querySelectorAll('.sound-on')
      const soundOff = muteIcon.querySelectorAll('.sound-off')
      muteBtn.addEventListener('click', (e) => {
        e.stopPropagation()
        muted = !muted
        soundOn.forEach((el) => (el.style.display = muted ? 'none' : ''))
        soundOff.forEach((el) => (el.style.display = muted ? '' : 'none'))
      })

      let hintVisible = true
      let lastSpawn = 0
      const DEBOUNCE_MS = 120 // minimum ms between new blobs

      function spawnBlob(x, y) {
        const now = performance.now()
        if (now - lastSpawn < DEBOUNCE_MS) return
        lastSpawn = now

        if (hintVisible) {
          hint.classList.add('hidden')
          hintVisible = false
        }

        // fade out oldest blob if getting crowded
        let liveCount = 0
        let oldest = null
        for (let i = 0; i < blobs.length; i++) {
          if (!blobs[i].dead && !blobs[i].fadeIn) {
            liveCount++
            if (!oldest) oldest = blobs[i]
          }
        }
        if (liveCount > 6) oldest.startFadeOut()

        const b = new Blob()
        if (x !== undefined) {
          b.x = x
          b.y = y
        }
        blobs.push(b)
        playChime()
      }

      // fullscreen toggle — hide on platforms without support (iOS Safari)
      const fsBtn = document.getElementById('fs-btn')
      if (!document.fullscreenEnabled) {
        fsBtn.style.display = 'none'
      } else {
        fsBtn.addEventListener('click', (e) => {
          e.stopPropagation()
          if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen()
          } else {
            document.exitFullscreen()
          }
        })
        document.addEventListener('fullscreenchange', () => {
          fsBtn.classList.toggle('hidden', !!document.fullscreenElement)
        })
      }

      document.addEventListener('keydown', (e) => {
        e.preventDefault()
        spawnBlob()
      })

      document.addEventListener('click', (e) => {
        if (fsBtn.contains(e.target) || muteBtn.contains(e.target)) return
        spawnBlob(e.clientX, e.clientY)
      })

      // also support touch for tablets
      document.addEventListener(
        'touchstart',
        (e) => {
          // let taps on control buttons through
          if (fsBtn.contains(e.target) || muteBtn.contains(e.target)) return
          e.preventDefault()
          const t = e.changedTouches[0]
          spawnBlob(t.clientX, t.clientY)
        },
        { passive: false },
      )

      function loop() {
        ctx.fillStyle = '#0a0a12'
        ctx.fillRect(0, 0, W, H)
        bCtx.clearRect(0, 0, W, H)

        for (let i = blobs.length - 1; i >= 0; i--) {
          blobs[i].update()
          blobs[i].draw()
          if (blobs[i].dead) {
            blobs[i] = blobs[blobs.length - 1]
            blobs.pop()
          }
        }

        requestAnimationFrame(loop)
      }
      loop()
    </script>
  </body>
</html>
